<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 석사 징검다리 정복기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#87CEEB;overflow-x:hidden;}

/* ========== SCENE ========== */
.scene{
  position:relative;width:100%;height:310px;overflow:hidden;
  background:linear-gradient(180deg,#5BB8F5 0%,#87CEEB 55%,#A8D8A8 55%,#6BAE4B 65%,#4A90E2 65%,#3A80D2 82%,#5A9E3A 82%,#4A8E2A 100%);
}

/* clouds */
.cloud{position:absolute;background:#fff;border-radius:40px;opacity:.92;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.c1{width:90px;height:32px;top:22px;animation:fc 22s linear infinite;}
.c1::before{width:44px;height:44px;top:-22px;left:12px;}
.c1::after{width:32px;height:32px;top:-16px;left:46px;}
.c2{width:110px;height:38px;top:55px;animation:fc 30s linear infinite 8s;}
.c2::before{width:54px;height:54px;top:-28px;left:16px;}
.c2::after{width:38px;height:38px;top:-20px;left:58px;}
.c3{width:75px;height:28px;top:15px;animation:fc 18s linear infinite 4s;}
.c3::before{width:36px;height:36px;top:-18px;left:10px;}
.c3::after{width:28px;height:28px;top:-14px;left:38px;}
@keyframes fc{from{left:-160px}to{left:calc(100% + 160px)}}

/* river waves */
.river-shine{
  position:absolute;bottom:62px;left:0;right:0;height:110px;
  background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 100%);
  animation:rshine 3s ease-in-out infinite alternate;
}
@keyframes rshine{from{opacity:.6}to{opacity:1}}
.ripple{
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.5);
  animation:ripA 2.8s ease-out infinite;
}
.rp1{width:36px;height:14px;bottom:80px;left:18%;animation-delay:0s;}
.rp2{width:24px;height:10px;bottom:110px;left:46%;animation-delay:1.1s;}
.rp3{width:30px;height:12px;bottom:90px;left:73%;animation-delay:2s;}
@keyframes ripA{0%{transform:scaleX(1);opacity:.8}100%{transform:scaleX(2.8);opacity:0}}

/* ---- STONES ---- */
.stones-row{
  position:absolute;bottom:74px;left:0;right:0;
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:0 6%;pointer-events:none;
}
.stone{
  position:relative;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.58rem;font-weight:700;color:rgba(255,255,255,.9);
  transition:all .3s;
  box-shadow:0 5px 10px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.25);
}
.stone:nth-child(1){width:72px;height:44px;background:radial-gradient(ellipse at 35% 35%,#A0A0A0,#606060);}
.stone:nth-child(2){width:66px;height:40px;background:radial-gradient(ellipse at 35% 35%,#989898,#585858);margin-bottom:6px;}
.stone:nth-child(3){width:70px;height:42px;background:radial-gradient(ellipse at 35% 35%,#9A9A9A,#5C5C5C);margin-bottom:2px;}
.stone:nth-child(4){width:80px;height:50px;background:radial-gradient(ellipse at 35% 35%,#B8C870,#789020);font-size:.75rem;}
.stone.current{
  background:radial-gradient(ellipse at 35% 35%,#B8D4A8,#6A9E5A) !important;
  box-shadow:0 4px 20px rgba(100,200,80,.7),inset 0 -3px 6px rgba(0,0,0,.2);
  animation:spulse 1.6s ease-in-out infinite;
}
.stone.visited{background:radial-gradient(ellipse at 35% 35%,#D4BC70,#9E8840) !important;}
@keyframes spulse{0%,100%{box-shadow:0 4px 20px rgba(100,200,80,.7);}50%{box-shadow:0 4px 32px rgba(100,200,80,1),0 0 0 8px rgba(100,200,80,.15);}}
.stone span{position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5);text-align:center;line-height:1.2;}

/* ---- STUDENT CHARACTER WRAP ---- */
.char-wrap{
  position:absolute;bottom:116px;
  transition:left .9s cubic-bezier(.25,.46,.45,.94);
  transform:translateX(-50%);z-index:10;
}
.char-body{
  position:relative;width:56px;height:98px;
  transform-origin:50% 100%;
}

/* graduation hat */
.p-hat{
  display:none;position:absolute;
  top:-2px;left:50%;transform:translateX(-50%);
  width:46px;height:8px;background:#111;border-radius:3px;z-index:5;
}
.p-hat::before{
  content:'';position:absolute;width:30px;height:16px;background:#111;
  bottom:8px;left:50%;transform:translateX(-50%);border-radius:4px 4px 0 0;
}
.p-hat::after{content:'🟡';font-size:8px;line-height:1;position:absolute;top:-14px;right:4px;}
.outfit-grad .p-hat{display:block;}

/* head */
.p-head{
  position:absolute;width:32px;height:32px;border-radius:50%;
  background:#F4A261;border:2px solid #D4824A;
  top:10px;left:50%;transform:translateX(-50%);z-index:4;
}
.p-head::before{
  content:'';position:absolute;
  width:5px;height:5px;border-radius:50%;background:#2C1810;
  top:10px;left:6px;box-shadow:10px 0 0 #2C1810;
}
.p-head::after{
  content:'';position:absolute;width:12px;height:6px;
  border:2px solid #2C1810;border-top:none;
  border-radius:0 0 12px 12px;bottom:7px;left:50%;transform:translateX(-50%);
}

/* hoodie hood */
.p-hood{
  display:none;position:absolute;
  top:4px;left:50%;transform:translateX(-50%);
  width:40px;height:24px;background:#4A5BAD;border-radius:50% 50% 0 0;z-index:3;
}
.outfit-hoodie .p-hood{display:block;}

/* torso */
.p-torso{
  position:absolute;width:36px;height:30px;border-radius:6px 6px 3px 3px;
  background:#5C6BC0;top:40px;left:50%;transform:translateX(-50%);z-index:3;transition:background .5s;
}
.outfit-shirt .p-torso{background:#F0F0F0;}
.outfit-shirt .p-torso::after{content:'';display:block;width:4px;height:100%;background:#5C9FE8;margin:0 auto;border-radius:2px;}
.outfit-grad .p-torso{background:#1A1A6E;}

/* arms */
.p-arm-l,.p-arm-r{
  position:absolute;width:11px;height:26px;border-radius:5px;
  background:#5C6BC0;top:41px;transition:background .5s;z-index:2;
}
.p-arm-l{left:2px;transform-origin:top center;animation:al 1.1s ease-in-out infinite alternate;}
.p-arm-r{right:2px;transform-origin:top center;animation:ar 1.1s ease-in-out infinite alternate;}
@keyframes al{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
@keyframes ar{from{transform:rotate(12deg)}to{transform:rotate(-12deg)}}
.outfit-shirt .p-arm-l,.outfit-shirt .p-arm-r{background:#F0F0F0;}
.outfit-grad .p-arm-l,.outfit-grad .p-arm-r{background:#1A1A6E;}

/* legs */
.p-leg-l,.p-leg-r{
  position:absolute;width:13px;height:30px;border-radius:4px 4px 7px 7px;
  background:#7B8EC8;top:68px;transition:background .5s;z-index:2;
}
.p-leg-l{left:9px;transform-origin:top center;animation:ll 1.1s ease-in-out infinite alternate;}
.p-leg-r{right:9px;transform-origin:top center;animation:lr 1.1s ease-in-out infinite alternate;}
@keyframes ll{from{transform:rotate(-9deg)}to{transform:rotate(9deg)}}
@keyframes lr{from{transform:rotate(9deg)}to{transform:rotate(-9deg)}}
.outfit-shirt .p-leg-l,.outfit-shirt .p-leg-r{background:#4A88D8;}
.outfit-grad .p-leg-l,.outfit-grad .p-leg-r{background:#1A1A6E;}

/* diploma */
.p-diploma{
  display:none;position:absolute;right:-18px;top:42px;
  font-size:18px;animation:dfl 1s ease-in-out infinite alternate;
}
.outfit-grad .p-diploma{display:block;}
@keyframes dfl{from{transform:rotate(-10deg)}to{transform:rotate(10deg) translateY(-4px)}}

/* backflip */
@keyframes backflip{
  0%  {transform:translateY(0) rotate(0deg);}
  20% {transform:translateY(-45px) rotate(-140deg);}
  50% {transform:translateY(-75px) rotate(-360deg);}
  80% {transform:translateY(-35px) rotate(-580deg);}
  100%{transform:translateY(0) rotate(-720deg);}
}
.char-body.flipping{animation:backflip .85s ease-in-out forwards !important;}
.char-body.flipping .p-arm-l,
.char-body.flipping .p-arm-r,
.char-body.flipping .p-leg-l,
.char-body.flipping .p-leg-r{animation:none;}

/* ---- PROFESSOR CHARACTER WRAP ---- */
.prof-wrap{
  position:absolute;bottom:116px;
  transition:left 1.3s cubic-bezier(.25,.46,.45,.94);
  transform:translateX(-50%);z-index:9;
}
.prof-body{
  position:relative;width:54px;height:96px;
  transform-origin:50% 100%;
}

/* professor head */
.pr-head{
  position:absolute;width:30px;height:30px;border-radius:50%;
  background:#EABF96;border:2px solid #C89A72;
  top:11px;left:50%;transform:translateX(-50%);z-index:4;
}
/* glasses */
.pr-head::before{
  content:'';position:absolute;
  width:9px;height:7px;
  border:1.8px solid #222;border-radius:2px;
  top:8px;left:2px;
  box-shadow:10px 0 0 0 #222, 10px 0 0 1.8px #222;
}
/* frown */
.pr-head::after{
  content:'';position:absolute;width:11px;height:4px;
  border:1.8px solid #222;border-bottom:none;
  border-radius:10px 10px 0 0;
  bottom:5px;left:50%;transform:translateX(-50%);
}

/* professor suit */
.pr-torso{
  position:absolute;width:32px;height:28px;
  background:#1A237E;border-radius:5px 5px 2px 2px;
  top:39px;left:50%;transform:translateX(-50%);z-index:3;
}
/* red tie */
.pr-torso::after{
  content:'';position:absolute;
  width:5px;height:17px;background:#C62828;
  left:50%;transform:translateX(-50%);top:2px;border-radius:2px 2px 3px 3px;
}

/* professor arms */
.pr-arm-l,.pr-arm-r{
  position:absolute;width:10px;height:23px;border-radius:5px;
  background:#1A237E;top:40px;z-index:2;
}
.pr-arm-l{left:5px;transform-origin:top center;animation:pral 1.2s ease-in-out infinite alternate;}
.pr-arm-r{right:5px;transform-origin:top center;animation:prar 1.2s ease-in-out infinite alternate;}
@keyframes pral{from{transform:rotate(8deg)}to{transform:rotate(-8deg)}}
@keyframes prar{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}

/* professor legs */
.pr-leg-l,.pr-leg-r{
  position:absolute;width:11px;height:27px;border-radius:3px 3px 6px 6px;
  background:#0D1B6E;top:65px;z-index:2;
}
.pr-leg-l{left:10px;transform-origin:top center;animation:prll 1.2s ease-in-out infinite alternate;}
.pr-leg-r{right:10px;transform-origin:top center;animation:prlr 1.2s ease-in-out infinite alternate;}
@keyframes prll{from{transform:rotate(-7deg)}to{transform:rotate(7deg)}}
@keyframes prlr{from{transform:rotate(7deg)}to{transform:rotate(-7deg)}}

/* ---- WHIP ---- */
.pr-whip{
  position:absolute;right:0px;top:37px;
  width:3px;height:26px;
  background:linear-gradient(#5C2E0A,#9B5B2A);
  border-radius:2px 2px 1px 1px;
  transform-origin:top center;
  transform:rotate(22deg);
  z-index:6;
}
.pr-whip::after{
  content:'';position:absolute;
  bottom:-10px;left:-1px;
  width:2px;height:12px;
  background:#7A4520;
  border-radius:0 0 2px 2px;
  transform:rotate(14deg);
}
/* whip crack glow */
.pr-crack{
  position:absolute;right:-22px;top:26px;
  width:22px;height:22px;
  background:radial-gradient(circle,#FFF176 20%,#FFD700 50%,#FF6600 80%,transparent 100%);
  border-radius:50%;opacity:0;z-index:15;pointer-events:none;
}

/* whipping keyframes */
@keyframes whipArmUp{
  0%  {transform:rotate(-8deg);}
  18% {transform:rotate(-120deg);}
  42% {transform:rotate(-75deg);}
  68% {transform:rotate(-105deg);}
  100%{transform:rotate(-8deg);}
}
@keyframes whipMotion{
  0%  {transform:rotate(22deg);}
  18% {transform:rotate(-95deg);}
  38% {transform:rotate(65deg);}
  58% {transform:rotate(-18deg);}
  78% {transform:rotate(26deg);}
  100%{transform:rotate(22deg);}
}
@keyframes crackFlash{
  0%  {opacity:0;transform:scale(.3);}
  28% {opacity:1;transform:scale(1.7);}
  55% {opacity:.8;transform:scale(1.2);}
  100%{opacity:0;transform:scale(.5);}
}
.prof-wrap.whipping .pr-arm-r{animation:whipArmUp .72s ease-in-out forwards !important;}
.prof-wrap.whipping .pr-whip{animation:whipMotion .72s ease-in-out forwards;}
.prof-wrap.whipping .pr-crack{animation:crackFlash .42s ease-out .19s forwards;}

/* ---- SCENE CROWD ---- */
.scene-crowd{
  position:absolute;bottom:168px;left:0;right:0;
  height:70px;pointer-events:none;z-index:6;overflow:hidden;
}
.sc-person{
  position:absolute;bottom:0;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  opacity:0;
}
.sc-person.show-left{animation:scL .5s ease-out forwards;}
.sc-person.show-right{animation:scR .5s ease-out forwards;}
@keyframes scL{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes scR{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.sc-h{width:16px;height:16px;border-radius:50%;}
/* arms row */
.sc-arms{position:relative;width:26px;height:0;top:-2px;display:flex;justify-content:space-between;}
.sc-arm{position:absolute;top:0;width:4px;height:11px;border-radius:2px;}
.sc-arm-l{left:0;transform-origin:top right;animation:scArml .42s ease-in-out infinite alternate;}
.sc-arm-r{right:0;transform-origin:top left;animation:scArmr .42s ease-in-out infinite alternate;}
@keyframes scArml{from{transform:rotate(20deg)}to{transform:rotate(-65deg)}}
@keyframes scArmr{from{transform:rotate(-20deg)}to{transform:rotate(65deg)}}
.sc-b{width:12px;height:18px;border-radius:3px;margin-top:1px;}
.sc-legs{display:flex;gap:2px;margin-top:1px;}
.sc-l{width:5px;height:12px;border-radius:3px;animation:scjump .42s ease-in-out infinite alternate;}
.sc-person:nth-child(2) .sc-l{animation-delay:.10s}
.sc-person:nth-child(3) .sc-l{animation-delay:.20s}
.sc-person:nth-child(4) .sc-l{animation-delay:.15s}
.sc-person:nth-child(5) .sc-l{animation-delay:.05s}
.sc-person:nth-child(6) .sc-l{animation-delay:.25s}
.sc-person:nth-child(7) .sc-l{animation-delay:.08s}
.sc-person:nth-child(8) .sc-l{animation-delay:.18s}
@keyframes scjump{from{transform:scaleY(1)}to{transform:scaleY(.6)}}
.sc-person .sc-h,.sc-person .sc-b{animation:scbounce .45s ease-in-out infinite alternate;}
@keyframes scbounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.sc-person:nth-child(even) .sc-h,
.sc-person:nth-child(even) .sc-b{animation-delay:.22s}
.sc-person:nth-child(2n) .sc-arm-l,
.sc-person:nth-child(2n) .sc-arm-r{animation-delay:.22s}
.sc-person:nth-child(3n) .sc-arm-l,
.sc-person:nth-child(3n) .sc-arm-r{animation-delay:.11s}

/* ========== CONFETTI ========== */
#cc{position:fixed;inset:0;pointer-events:none;z-index:9997;}

/* ========== CELEBRATION OVERLAY ========== */
#cel{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);
  z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .3s;padding:20px;
}
#cel.show{opacity:1;pointer-events:all;}

/* ---- CEL CROWD CSS FIGURES ---- */
.cel-crowd{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;}
.celf{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  animation:celfB .42s ease-in-out infinite alternate;
}
.celf:nth-child(2n){animation-delay:.18s;}
.celf:nth-child(3n){animation-delay:.08s;}
.celf:nth-child(4n){animation-delay:.26s;}
.celf:nth-child(5n){animation-delay:.12s;}
@keyframes celfB{from{transform:translateY(0)}to{transform:translateY(-11px)}}
.celf-h{width:14px;height:14px;border-radius:50%;}
.celf-arms-row{position:relative;width:28px;height:0;top:-2px;}
.celf-al,.celf-ar{
  position:absolute;top:0;width:5px;height:13px;border-radius:3px;
}
.celf-al{left:0;transform-origin:top right;animation:celfAl .42s ease-in-out infinite alternate;}
.celf-ar{right:0;transform-origin:top left;animation:celfAr .42s ease-in-out infinite alternate;}
@keyframes celfAl{from{transform:rotate(10deg)}to{transform:rotate(-120deg)}}
@keyframes celfAr{from{transform:rotate(-10deg)}to{transform:rotate(120deg)}}
.celf-b{width:12px;height:15px;border-radius:3px;margin-top:1px;}
.celf-legs{display:flex;gap:2px;margin-top:1px;}
.celf-lg{width:5px;height:11px;border-radius:3px;}
.celf:nth-child(2n) .celf-al,
.celf:nth-child(2n) .celf-ar{animation-delay:.2s}

/* celebration texts */
.cel-emoji{font-size:5rem;display:block;animation:ceb .4s infinite alternate;}
@keyframes ceb{from{transform:translateY(0) scale(1)}to{transform:translateY(-18px) scale(1.12)}}
.cel-title{
  font-size:2.1rem;font-weight:900;margin:12px 0 8px;text-align:center;
  color:#FFD200;text-shadow:0 0 24px rgba(255,210,0,.9);animation:rb .6s ease;
}
@keyframes rb{
  0%{transform:scale(1)}30%{transform:scaleX(1.28) scaleY(.72)}
  40%{transform:scaleX(.72) scaleY(1.28)}60%{transform:scaleX(1.15) scaleY(.85)}100%{transform:scale(1)}
}
.cel-sub{
  font-size:.97rem;color:#eee;text-align:center;
  max-width:380px;line-height:1.75;margin-bottom:14px;white-space:pre-line;
}
.cel-badge{
  font-size:.8rem;color:#FFD200;margin-bottom:18px;
  padding:6px 14px;border:1px solid rgba(255,210,0,.4);border-radius:20px;
}
.cel-btn{
  padding:13px 34px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#1a1a1a;font-weight:800;font-size:1rem;cursor:pointer;animation:pb 1s infinite;
}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(255,210,0,.5)}50%{box-shadow:0 0 0 16px rgba(255,210,0,0)}}
.cel-btn:hover{transform:scale(1.05);}
.grad-rainbow{
  background:linear-gradient(90deg,#ff0080,#ff8c00,#ffd200,#00e676,#00b0ff,#aa00ff);
  background-size:300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:rbow 1.4s linear infinite;
}
@keyframes rbow{0%{background-position:0%}100%{background-position:300%}}

/* ========== STAR PARTICLES ========== */
.sp{
  position:fixed;pointer-events:none;z-index:9998;font-size:1.8rem;
  animation:spfly 1.3s ease-out forwards;
}
@keyframes spfly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.15) rotate(720deg)}}

/* ========== SHAKE ========== */
@keyframes shk{
  0%,100%{transform:translate(0,0)}10%{transform:translate(-9px,-4px) rotate(-1.5deg)}
  20%{transform:translate(9px,5px) rotate(1.5deg)}30%{transform:translate(-11px,6px) rotate(-1deg)}
  40%{transform:translate(11px,-6px) rotate(1deg)}50%{transform:translate(-7px,8px) rotate(-1.5deg)}
  60%{transform:translate(7px,-8px) rotate(1.5deg)}80%{transform:translate(4px,-3px) rotate(1deg)}
}
body.shaking{animation:shk .7s ease;}
@keyframes flash{0%,100%{filter:brightness(1)}50%{filter:brightness(2.2) saturate(1.8)}}
body.flashing{animation:flash .12s ease 5;}

/* ========== APP LAYOUT ========== */
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.app-header{text-align:center;padding:18px 0 0;z-index:2;}
.app-header h1{font-size:1.55rem;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.3);}
.app-header p{font-size:.78rem;color:rgba(255,255,255,.8);margin-top:3px;}

/* ========== TODO SECTION ========== */
.todo-section{width:100%;max-width:540px;padding:16px 16px 50px;z-index:2;}
.prog-label{
  text-align:center;color:#fff;font-weight:700;font-size:.88rem;
  margin-bottom:10px;text-shadow:0 1px 6px rgba(0,0,0,.3);
}
.todo-card{
  background:rgba(255,255,255,.92);border-radius:20px;padding:22px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.irow{display:flex;gap:10px;margin-bottom:16px;}
.irow input{
  flex:1;padding:10px 14px;border-radius:12px;
  border:1.5px solid #dde;background:#f8f9ff;
  font-size:.93rem;color:#333;outline:none;transition:border .2s;
}
.irow input:focus{border-color:#5C9FE8;}
.irow input::placeholder{color:#aaa;}
.irow button{
  padding:10px 18px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#5C9FE8,#3A7FD0);
  color:#fff;font-weight:700;font-size:.93rem;cursor:pointer;transition:transform .15s;
}

function getDeviceId(){
  const KEY='ms_device_id';

// ===== AUDIO =====
let AC;
const getAC = () => AC || (AC = new (window.AudioContext||window.webkitAudioContext)());

function tone(freq, dur, type='triangle', vol=0.3, delay=0) {
  const ac = getAC();
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime+delay);
  g.gain.setValueAtTime(0, ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol, ac.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.05);
}

function playWhipCrack() {
  try {
    const ac = getAC();
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.12), ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2.5);
    }
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf;
    src.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.55, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    src.start();
  } catch(e){}
}

// ===== CONFETTI =====
const cv = document.getElementById('cc'), cx = cv.getContext('2d');
let pieces=[], confOn=false;
const resizeCv = ()=>{cv.width=innerWidth;cv.height=innerHeight;};
resizeCv(); addEventListener('resize',resizeCv);

function launchConfetti(n=160, dur=4000) {
  const cols=['#FFD200','#F7971E','#FF6B6B','#48DBFB','#FF9FF3','#54A0FF','#5F27CD','#00D2D3','#FF4757','#2ED573','#FF6348','#ECCC68'];
  for(let i=0;i<n;i++) pieces.push({
    x:Math.random()*cv.width, y:-10-Math.random()*80,
    w:7+Math.random()*11, h:4+Math.random()*7,
    col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*Math.PI*2,
    vx:(Math.random()-.5)*7, vy:2.5+Math.random()*5,
    vrot:(Math.random()-.5)*.26, life:1,
    decay:1/(dur/16)
  });
  if(!confOn){confOn=true;animConf();}
  setTimeout(()=>confOn=false, dur);
}
function animConf(){
  cx.clearRect(0,0,cv.width,cv.height);
  pieces=pieces.filter(p=>p.life>.01);
  pieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.rot+=p.vrot; p.life-=p.decay*.4;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
    cx.globalAlpha=Math.max(0,p.life); cx.fillStyle=p.col;
    cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
  });
  if(confOn||pieces.length>0) requestAnimationFrame(animConf);
  else cx.clearRect(0,0,cv.width,cv.height);
}

  else setTimeout(playJingle,100);
  spawnSceneCrowd(grad);

  const msgs=grad?GRAD_MSGS:NORMAL_MSGS;
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('celEmoji').textContent=m.e;
  const tt=document.getElementById('celTitle');
  tt.textContent=m.t;
  tt.className=m.g?'cel-title grad-rainbow':'cel-title';
  if(!m.g) tt.style.color='#FFD200'; else tt.style.color='';
  document.getElementById('celSub').textContent=m.s;

  const badges=['석사 새싹 🌱','석사 성장 🌿','석사 만개 🌸','석사 열매 🍎','석사 레전드 🏆','씹갓생 석사 신🌟','석사 전설 🔱'];
  document.getElementById('celBadge').textContent=`누적 ${completedCount}개 완료 | ${badges[Math.min(completedCount-1,badges.length-1)]}`;

  setCelCrowd(grad);
  document.getElementById('cel').classList.add('show');
  isCelebrating=true;
}

function closeCel(){
  document.getElementById('cel').classList.remove('show');
  isCelebrating=false;
  clearSceneCrowd();
  if(celQueue.length>0){
    const next=celQueue.shift();
    setTimeout(()=>triggerCel(next),500);
  }
}

function updateResetBtn(){
  const btn=document.getElementById('resetBtn');
  if(completedCount>0&&completedCount%3===0) btn.classList.add('lit');
  else btn.classList.remove('lit');
}

async function resetAll(){
  const msg=completedCount%3===0&&completedCount>0
    ?`🎓 ${completedCount}개 완료! 새 라운드를 시작할까요?\n(모든 할일이 삭제됩니다)`
    :'모든 할일을 삭제하고 처음부터 시작할까요?';
  if(!confirm(msg)) return;

  const {error}=await db.from('tasks').delete().eq('user_id',DEVICE_ID);
  if(error){console.error('리셋 실패:',error);alert('리셋 중 오류가 발생했어요 😢');return;}

  tasks=[];
  completedCount=0;
  currentStone=0;
  celQueue=[];
  isCelebrating=false;

  document.getElementById('cel').classList.remove('show');
  clearSceneCrowd();
  updateOutfit(0);
  moveChar(0);
  moveProf(0);
  updateProg();
  updateResetBtn();
  render();
}

// ===== TASKS (Supabase) =====
async function loadTasks(){
  document.getElementById('tlist').innerHTML='<li class="empty-msg">불러오는 중... ⏳</li>';
  const {data,error}=await db.from('tasks').select('*').eq('user_id',DEVICE_ID).order('created_at',{ascending:true});
  if(error){
    console.error('불러오기 실패:',error);
    document.getElementById('tlist').innerHTML='<li class="empty-msg">불러오기 실패 😢 새로고침 해보세요</li>';
    return;
  }
  tasks=(data||[]).map(r=>({id:r.id,text:r.content,done:r.is_completed}));
  completedCount=tasks.filter(t=>t.done).length;
  updateOutfit(completedCount);
  moveChar(completedCount);
  moveProf(completedCount);
  updateProg();
  render();
}

async function addTask(){
  const inp=document.getElementById('taskInput');
  const t=inp.value.trim(); if(!t){inp.focus();return;}
  inp.value=''; inp.focus();
  const {data,error}=await db.from('tasks').insert({content:t,is_completed:false,user_id:DEVICE_ID}).select().single();
  if(error){console.error('추가 실패:',error);inp.value=t;return;}
  tasks.push({id:data.id,text:data.content,done:data.is_completed});
  render();
}

async function toggleTask(id){
  const task=tasks.find(t=>t.id===id);
  if(!task||task.done) return;
  const {error}=await db.from('tasks').update({is_completed:true}).eq('id',id);
  if(error){console.error('업데이트 실패:',error);return;}
  task.done=true; completedCount++;
  updateOutfit(completedCount);
  updateProg(); render();

  doWhip();
  setTimeout(()=>doFlip(), 310);
  setTimeout(()=>moveChar(completedCount), 530);
  setTimeout(()=>moveProf(completedCount), 1050);

  const grad=completedCount%3===0;
  setTimeout(()=>{
    if(isCelebrating) celQueue.push(grad);
    else triggerCel(grad);
  }, 720);
}

async function deleteTask(id){
  const {error}=await db.from('tasks').delete().eq('id',id);
  if(error){console.error('삭제 실패:',error);return;}
  tasks=tasks.filter(t=>t.id!==id);
  render();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const ul=document.getElementById('tlist');
  if(!tasks.length){ul.innerHTML='<li class="empty-msg">석사 할일을 추가해보세요! ✍️</li>';return;}
  ul.innerHTML='';
  tasks.forEach(t=>{
    const li=document.createElement('li');
    li.className='titem'+(t.done?' done':'');
    li.innerHTML=`<div class="tchk">${t.done?'✓':''}</div><span class="ttext">${esc(t.text)}</span><button class="tdel">✕</button>`;
    li.querySelector('.tdel').addEventListener('click',e=>{e.stopPropagation();deleteTask(t.id);});
    if(!t.done) li.addEventListener('click',()=>toggleTask(t.id));
    ul.appendChild(li);
  });
}

// ===== INIT =====
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

window.addEventListener('load',()=>{
  document.getElementById('charWrap').style.left=STONE_PCT[0]+'%';
  document.getElementById('profWrap').style.left=PROF_PCT[0]+'%';
  loadTasks();
});
</script>
</body>
</html>
