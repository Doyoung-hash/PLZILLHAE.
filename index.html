<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 대학원생 징검다리 정복기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#87CEEB;overflow-x:hidden;}

/* ========== SCENE ========== */
.scene{
  position:relative;width:100%;height:310px;overflow:hidden;
  background:linear-gradient(180deg,#5BB8F5 0%,#87CEEB 55%,#A8D8A8 55%,#6BAE4B 65%,#4A90E2 65%,#3A80D2 82%,#5A9E3A 82%,#4A8E2A 100%);
}

/* clouds */
.cloud{position:absolute;background:#fff;border-radius:40px;opacity:.92;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.c1{width:90px;height:32px;top:22px;animation:fc 22s linear infinite;}
.c1::before{width:44px;height:44px;top:-22px;left:12px;}
.c1::after{width:32px;height:32px;top:-16px;left:46px;}
.c2{width:110px;height:38px;top:55px;animation:fc 30s linear infinite 8s;}
.c2::before{width:54px;height:54px;top:-28px;left:16px;}
.c2::after{width:38px;height:38px;top:-20px;left:58px;}
.c3{width:75px;height:28px;top:15px;animation:fc 18s linear infinite 4s;}
.c3::before{width:36px;height:36px;top:-18px;left:10px;}
.c3::after{width:28px;height:28px;top:-14px;left:38px;}
@keyframes fc{from{left:-160px}to{left:calc(100% + 160px)}}

/* river waves */
.river-shine{
  position:absolute;bottom:62px;left:0;right:0;height:110px;
  background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 100%);
  animation:rshine 3s ease-in-out infinite alternate;
}
@keyframes rshine{from{opacity:.6}to{opacity:1}}
.ripple{
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.5);
  animation:ripA 2.8s ease-out infinite;
}
.rp1{width:36px;height:14px;bottom:80px;left:18%;animation-delay:0s;}
.rp2{width:24px;height:10px;bottom:110px;left:46%;animation-delay:1.1s;}
.rp3{width:30px;height:12px;bottom:90px;left:73%;animation-delay:2s;}
@keyframes ripA{0%{transform:scaleX(1);opacity:.8}100%{transform:scaleX(2.8);opacity:0}}

/* ---- STONES ---- */
.stones-row{
  position:absolute;bottom:74px;left:0;right:0;
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:0 6%;pointer-events:none;
}
.stone{
  position:relative;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;color:rgba(255,255,255,.85);
  transition:all .3s;
  box-shadow:0 5px 10px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.25);
}
.stone:nth-child(1){width:72px;height:44px;background:radial-gradient(ellipse at 35% 35%,#A0A0A0,#606060);}
.stone:nth-child(2){width:66px;height:40px;background:radial-gradient(ellipse at 35% 35%,#989898,#585858);margin-bottom:6px;}
.stone:nth-child(3){width:70px;height:42px;background:radial-gradient(ellipse at 35% 35%,#9A9A9A,#5C5C5C);margin-bottom:2px;}
.stone:nth-child(4){width:78px;height:48px;background:radial-gradient(ellipse at 35% 35%,#B8C870,#789020);font-size:.9rem;}
.stone.current{
  background:radial-gradient(ellipse at 35% 35%,#B8D4A8,#6A9E5A) !important;
  box-shadow:0 4px 20px rgba(100,200,80,.7),inset 0 -3px 6px rgba(0,0,0,.2);
  animation:spulse 1.6s ease-in-out infinite;
}
.stone.visited{background:radial-gradient(ellipse at 35% 35%,#D4BC70,#9E8840) !important;}
@keyframes spulse{0%,100%{box-shadow:0 4px 20px rgba(100,200,80,.7);}50%{box-shadow:0 4px 32px rgba(100,200,80,1),0 0 0 8px rgba(100,200,80,.15);}}

/* stone label */
.stone span{position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5);}

/* ---- CHARACTER WRAP ---- */
.char-wrap{
  position:absolute;
  bottom:116px;
  transition:left .9s cubic-bezier(.25,.46,.45,.94);
  transform:translateX(-50%);
  z-index:10;
}

/* ---- CHARACTER ---- */
.char-body{
  position:relative;
  width:56px;height:98px;
  transform-origin:50% 100%;
}

/* graduation hat */
.p-hat{
  display:none;
  position:absolute;
  top:-2px;left:50%;transform:translateX(-50%);
  width:46px;height:8px;
  background:#111;
  border-radius:3px;
  z-index:5;
}
.p-hat::before{
  content:'';position:absolute;
  width:30px;height:16px;
  background:#111;
  bottom:8px;left:50%;transform:translateX(-50%);
  border-radius:4px 4px 0 0;
}
.p-hat::after{
  content:'🟡';font-size:8px;line-height:1;
  position:absolute;top:-14px;right:4px;
}
.outfit-grad .p-hat{display:block;}

/* head */
.p-head{
  position:absolute;
  width:32px;height:32px;border-radius:50%;
  background:#F4A261;border:2px solid #D4824A;
  top:10px;left:50%;transform:translateX(-50%);
  z-index:4;
}
.p-head::before{ /* eyes */
  content:'';position:absolute;
  width:5px;height:5px;border-radius:50%;background:#2C1810;
  top:10px;left:6px;
  box-shadow:10px 0 0 #2C1810;
}
.p-head::after{ /* mouth */
  content:'';position:absolute;
  width:12px;height:6px;
  border:2px solid #2C1810;border-top:none;
  border-radius:0 0 12px 12px;
  bottom:7px;left:50%;transform:translateX(-50%);
}

/* hoodie hood */
.p-hood{
  display:none;
  position:absolute;
  top:4px;left:50%;transform:translateX(-50%);
  width:40px;height:24px;
  background:#4A5BAD;border-radius:50% 50% 0 0;
  z-index:3;
}
.outfit-hoodie .p-hood{display:block;}

/* torso */
.p-torso{
  position:absolute;
  width:36px;height:30px;
  border-radius:6px 6px 3px 3px;
  background:#5C6BC0;
  top:40px;left:50%;transform:translateX(-50%);
  z-index:3;
  transition:background .5s;
}
.outfit-shirt .p-torso{background:#F0F0F0;}
.outfit-shirt .p-torso::after{
  content:'';display:block;
  width:4px;height:100%;background:#5C9FE8;
  margin:0 auto;border-radius:2px;
}
.outfit-grad .p-torso{background:#1A1A6E;}

/* arms */
.p-arm-l,.p-arm-r{
  position:absolute;
  width:11px;height:26px;border-radius:5px;
  background:#5C6BC0;top:41px;
  transition:background .5s;
  z-index:2;
}
.p-arm-l{left:2px;transform-origin:top center;animation:al 1.1s ease-in-out infinite alternate;}
.p-arm-r{right:2px;transform-origin:top center;animation:ar 1.1s ease-in-out infinite alternate;}
@keyframes al{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
@keyframes ar{from{transform:rotate(12deg)}to{transform:rotate(-12deg)}}
.outfit-shirt .p-arm-l,.outfit-shirt .p-arm-r{background:#F0F0F0;}
.outfit-grad .p-arm-l,.outfit-grad .p-arm-r{background:#1A1A6E;}

/* legs */
.p-leg-l,.p-leg-r{
  position:absolute;
  width:13px;height:30px;border-radius:4px 4px 7px 7px;
  background:#7B8EC8;top:68px;
  transition:background .5s;
  z-index:2;
}
.p-leg-l{left:9px;transform-origin:top center;animation:ll 1.1s ease-in-out infinite alternate;}
.p-leg-r{right:9px;transform-origin:top center;animation:lr 1.1s ease-in-out infinite alternate;}
@keyframes ll{from{transform:rotate(-9deg)}to{transform:rotate(9deg)}}
@keyframes lr{from{transform:rotate(9deg)}to{transform:rotate(-9deg)}}
.outfit-shirt .p-leg-l,.outfit-shirt .p-leg-r{background:#4A88D8;}
.outfit-grad .p-leg-l,.outfit-grad .p-leg-r{background:#1A1A6E;}

/* diploma */
.p-diploma{
  display:none;
  position:absolute;
  right:-18px;top:42px;
  font-size:18px;
  animation:dfl 1s ease-in-out infinite alternate;
}
.outfit-grad .p-diploma{display:block;}
@keyframes dfl{from{transform:rotate(-10deg)}to{transform:rotate(10deg) translateY(-4px)}}

/* backflip */
@keyframes backflip{
  0%  {transform:translateY(0) rotate(0deg);}
  20% {transform:translateY(-45px) rotate(-140deg);}
  50% {transform:translateY(-75px) rotate(-360deg);}
  80% {transform:translateY(-35px) rotate(-580deg);}
  100%{transform:translateY(0) rotate(-720deg);}
}
.char-body.flipping{
  animation:backflip .85s ease-in-out forwards !important;
}
.char-body.flipping .p-arm-l,
.char-body.flipping .p-arm-r,
.char-body.flipping .p-leg-l,
.char-body.flipping .p-leg-r{animation:none;}

/* ========== CROWD OVERLAY IN SCENE ========== */
.scene-crowd{
  position:absolute;bottom:168px;left:0;right:0;
  height:70px;pointer-events:none;z-index:6;
  overflow:hidden;
}
.sc-person{
  position:absolute;bottom:0;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;
}
.sc-person.show-left{animation:scL .5s ease-out forwards;}
.sc-person.show-right{animation:scR .5s ease-out forwards;}
@keyframes scL{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes scR{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.sc-h{width:16px;height:16px;border-radius:50%;}
.sc-b{width:12px;height:18px;border-radius:3px;margin-top:1px;}
.sc-legs{display:flex;gap:2px;margin-top:1px;}
.sc-l{width:5px;height:12px;border-radius:3px;animation:scjump .4s ease-in-out infinite alternate;}
.sc-person:nth-child(2) .sc-l{animation-delay:.1s}
.sc-person:nth-child(3) .sc-l{animation-delay:.2s}
.sc-person:nth-child(4) .sc-l{animation-delay:.15s}
.sc-person:nth-child(5) .sc-l{animation-delay:.05s}
@keyframes scjump{from{transform:scaleY(1)}to{transform:scaleY(.65)}}
.sc-person .sc-h,.sc-person .sc-b{animation:scbounce .45s ease-in-out infinite alternate;}
@keyframes scbounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.sc-person:nth-child(even) .sc-h,
.sc-person:nth-child(even) .sc-b{animation-delay:.2s}

/* ========== CONFETTI ========== */
#cc{position:fixed;inset:0;pointer-events:none;z-index:9997;}

/* ========== CELEBRATION OVERLAY ========== */
#cel{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);
  z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .3s;
  padding:20px;
}
#cel.show{opacity:1;pointer-events:all;}

.cel-crowd{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;}
.cel-cp{font-size:2.4rem;animation:ccb .4s ease-in-out infinite alternate;}
.cel-cp:nth-child(2){animation-delay:.08s}
.cel-cp:nth-child(3){animation-delay:.16s}
.cel-cp:nth-child(4){animation-delay:.24s}
.cel-cp:nth-child(5){animation-delay:.32s}
.cel-cp:nth-child(6){animation-delay:.12s}
.cel-cp:nth-child(7){animation-delay:.2s}
@keyframes ccb{from{transform:translateY(0) rotate(-6deg)}to{transform:translateY(-16px) rotate(6deg)}}

.cel-emoji{font-size:5rem;display:block;animation:ceb .4s infinite alternate;}
@keyframes ceb{from{transform:translateY(0) scale(1)}to{transform:translateY(-18px) scale(1.12)}}

.cel-title{
  font-size:2.1rem;font-weight:900;
  margin:12px 0 8px;text-align:center;
  color:#FFD200;
  text-shadow:0 0 24px rgba(255,210,0,.9);
  animation:rb .6s ease;
}
@keyframes rb{
  0%{transform:scale(1)}30%{transform:scaleX(1.28) scaleY(.72)}
  40%{transform:scaleX(.72) scaleY(1.28)}60%{transform:scaleX(1.15) scaleY(.85)}100%{transform:scale(1)}
}

.cel-sub{
  font-size:.97rem;color:#eee;text-align:center;
  max-width:380px;line-height:1.75;margin-bottom:14px;
  white-space:pre-line;
}
.cel-badge{
  font-size:.8rem;color:#FFD200;margin-bottom:18px;
  padding:6px 14px;border:1px solid rgba(255,210,0,.4);
  border-radius:20px;
}
.cel-btn{
  padding:13px 34px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#1a1a1a;font-weight:800;font-size:1rem;cursor:pointer;
  animation:pb 1s infinite;
}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(255,210,0,.5)}50%{box-shadow:0 0 0 16px rgba(255,210,0,0)}}
.cel-btn:hover{transform:scale(1.05);}

.grad-rainbow{
  background:linear-gradient(90deg,#ff0080,#ff8c00,#ffd200,#00e676,#00b0ff,#aa00ff);
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:rbow 1.4s linear infinite;
}
@keyframes rbow{0%{background-position:0%}100%{background-position:300%}}

/* ========== STAR PARTICLES ========== */
.sp{
  position:fixed;pointer-events:none;z-index:9998;
  font-size:1.8rem;
  animation:spfly 1.3s ease-out forwards;
}
@keyframes spfly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.15) rotate(720deg)}}

/* ========== SHAKE ========== */
@keyframes shk{
  0%,100%{transform:translate(0,0)}10%{transform:translate(-9px,-4px) rotate(-1.5deg)}
  20%{transform:translate(9px,5px) rotate(1.5deg)}30%{transform:translate(-11px,6px) rotate(-1deg)}
  40%{transform:translate(11px,-6px) rotate(1deg)}50%{transform:translate(-7px,8px) rotate(-1.5deg)}
  60%{transform:translate(7px,-8px) rotate(1.5deg)}80%{transform:translate(4px,-3px) rotate(1deg)}
}
body.shaking{animation:shk .7s ease;}
@keyframes flash{0%,100%{filter:brightness(1)}50%{filter:brightness(2.2) saturate(1.8)}}
body.flashing{animation:flash .12s ease 5;}

/* ========== APP LAYOUT ========== */
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;}

.app-header{
  text-align:center;padding:18px 0 0;z-index:2;
}
.app-header h1{
  font-size:1.55rem;font-weight:900;
  color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.3);
}
.app-header p{font-size:.78rem;color:rgba(255,255,255,.8);margin-top:3px;}

/* ========== TODO SECTION ========== */
.todo-section{
  width:100%;max-width:540px;padding:16px 16px 50px;z-index:2;
}
.prog-label{
  text-align:center;color:#fff;font-weight:700;font-size:.88rem;
  margin-bottom:10px;text-shadow:0 1px 6px rgba(0,0,0,.3);
}
.todo-card{
  background:rgba(255,255,255,.92);
  border-radius:20px;padding:22px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.irow{display:flex;gap:10px;margin-bottom:16px;}
.irow input{
  flex:1;padding:10px 14px;border-radius:12px;
  border:1.5px solid #dde;background:#f8f9ff;
  font-size:.93rem;color:#333;outline:none;
  transition:border .2s;
}
.irow input:focus{border-color:#5C9FE8;}
.irow input::placeholder{color:#aaa;}
.irow button{
  padding:10px 18px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#5C9FE8,#3A7FD0);
  color:#fff;font-weight:700;font-size:.93rem;cursor:pointer;
  transition:transform .15s;
}
.irow button:hover{transform:scale(1.06);}

.tlist{list-style:none;display:flex;flex-direction:column;gap:8px;}
.titem{
  display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:13px;
  background:#f5f7ff;border:1.5px solid #e0e6ff;
  cursor:pointer;transition:all .2s;user-select:none;
}
.titem:hover{background:#eef0ff;transform:translateX(4px);}
.titem.done{background:#f0fff4;border-color:#c3e6cb;opacity:.6;cursor:default;}
.titem.done .ttext{text-decoration:line-through;color:#999;}
.tchk{
  width:23px;height:23px;border-radius:50%;border:2px solid #c0c8e0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:transparent;flex-shrink:0;transition:all .3s;
}
.titem.done .tchk{background:#28a745;border-color:#28a745;color:#fff;box-shadow:0 0 12px rgba(40,167,69,.4);}
.ttext{flex:1;font-size:.93rem;color:#333;}
.tdel{
  background:none;border:none;color:#ccc;font-size:15px;
  cursor:pointer;padding:2px 6px;border-radius:6px;transition:color .2s;
}
.tdel:hover{color:#ff6b6b;}
.empty-msg{text-align:center;color:#bbb;font-size:.88rem;padding:14px 0;}
</style>
</head>
<body>
<div id="app">

  <div class="app-header">
    <h1>🎓 대학원생 징검다리 정복기</h1>
    <p>할일을 완료해서 강을 건너 졸업까지!</p>
  </div>

  <!-- SCENE -->
  <div class="scene" id="scene">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="river-shine"></div>
    <div class="ripple rp1"></div>
    <div class="ripple rp2"></div>
    <div class="ripple rp3"></div>

    <!-- Stepping Stones -->
    <div class="stones-row">
      <div class="stone current" id="s0"><span>출발</span></div>
      <div class="stone" id="s1"><span>①</span></div>
      <div class="stone" id="s2"><span>②</span></div>
      <div class="stone" id="s3"><span>🎓</span></div>
    </div>

    <!-- Character -->
    <div class="char-wrap outfit-hoodie" id="charWrap">
      <div class="char-body" id="charBody">
        <div class="p-hat"></div>
        <div class="p-hood"></div>
        <div class="p-head"></div>
        <div class="p-torso"></div>
        <div class="p-arm-l"></div>
        <div class="p-arm-r"></div>
        <div class="p-leg-l"></div>
        <div class="p-leg-r"></div>
        <div class="p-diploma">📜</div>
      </div>
    </div>

    <!-- Scene crowd -->
    <div class="scene-crowd" id="sceneCrowd"></div>
  </div>

  <!-- TODO -->
  <div class="todo-section">
    <div class="prog-label" id="progLabel">🪨 징검다리를 건너 졸업까지 가보자!</div>
    <div class="todo-card">
      <div class="irow">
        <input id="taskInput" type="text" placeholder="할일 입력 (예: 논문 초안 쓰기)" maxlength="80"/>
        <button onclick="addTask()">추가</button>
      </div>
      <ul class="tlist" id="tlist">
        <li class="empty-msg">할일을 추가해보세요! ✍️</li>
      </ul>
    </div>
  </div>
</div>

<!-- Confetti -->
<canvas id="cc"></canvas>

<!-- Celebration overlay -->
<div id="cel">
  <div class="cel-crowd" id="celCrowd"></div>
  <span class="cel-emoji" id="celEmoji">🎉</span>
  <div class="cel-title" id="celTitle">완료!</div>
  <div class="cel-sub" id="celSub"></div>
  <div class="cel-badge" id="celBadge"></div>
  <button class="cel-btn" onclick="closeCel()">계속 정복하기! 💪</button>
</div>

<script>
// ===== STATE =====
let tasks = [], completedCount = 0, currentStone = 0;
let isCelebrating = false, celQueue = [];

// stone left% positions (char-wrap left %)
const STONE_PCT = [10, 33, 58, 82];

// ===== AUDIO =====
let AC;
const getAC = () => AC || (AC = new (window.AudioContext||window.webkitAudioContext)());

function tone(freq, dur, type='triangle', vol=0.3, delay=0) {
  const ac = getAC();
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime+delay);
  g.gain.setValueAtTime(0, ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol, ac.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.05);
}

function playCrowd() {
  for(let i=0;i<10;i++) tone(150+Math.random()*700,.25+Math.random()*.4,'sawtooth',.04,Math.random()*.35);
  tone(80,.6,'sine',.35,0); tone(110,.5,'sine',.25,.15);
}
function playJingle() {
  [[523,0],[659,.12],[784,.24],[1047,.38],[784,.52],[1047,.65],[1319,.8]].forEach(([f,t])=>tone(f,.18,'triangle',.3,t));
  tone(130,.9,'sine',.15,0);
}
function playGradFanfare() {
  [[523,0],[659,.13],[784,.26],[1047,.4],[1319,.56],[1047,.72],[1319,.85],[1568,1],[2093,1.2]].forEach(([f,t])=>tone(f,.32,'triangle',.38,t));
  tone(130,1.8,'sine',.25,0); tone(196,1.5,'sine',.2,.18);
  [0,.45,.9,1.35].forEach(t=>tone(80+Math.random()*40,.12,'sawtooth',.3,t));
}

// ===== CONFETTI =====
const cv = document.getElementById('cc'), cx = cv.getContext('2d');
let pieces=[], confOn=false;
const resizeCv = ()=>{cv.width=innerWidth;cv.height=innerHeight;};
resizeCv(); addEventListener('resize',resizeCv);

function launchConfetti(n=160, dur=4000) {
  const cols=['#FFD200','#F7971E','#FF6B6B','#48DBFB','#FF9FF3','#54A0FF','#5F27CD','#00D2D3','#FF4757','#2ED573','#FF6348','#ECCC68'];
  for(let i=0;i<n;i++) pieces.push({
    x:Math.random()*cv.width, y:-10-Math.random()*80,
    w:7+Math.random()*11, h:4+Math.random()*7,
    col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*Math.PI*2,
    vx:(Math.random()-.5)*7, vy:2.5+Math.random()*5,
    vrot:(Math.random()-.5)*.26, life:1,
    decay:1/(dur/16)
  });
  if(!confOn){confOn=true;animConf();}
  setTimeout(()=>confOn=false, dur);
}
function animConf(){
  cx.clearRect(0,0,cv.width,cv.height);
  pieces=pieces.filter(p=>p.life>.01);
  pieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.rot+=p.vrot; p.life-=p.decay*.4;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
    cx.globalAlpha=Math.max(0,p.life); cx.fillStyle=p.col;
    cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
  });
  if(confOn||pieces.length>0) requestAnimationFrame(animConf);
  else cx.clearRect(0,0,cv.width,cv.height);
}

// ===== STARS =====
function spawnStars(n=20, grad=false) {
  const sym = grad
    ? ['🎓','🏆','⭐','🌟','🎊','✨','📜','💫','🎉','👑']
    : ['⭐','✨','💫','🎊','🎉','👏','🔥','🌟','💥'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='sp';
    el.textContent=sym[Math.floor(Math.random()*sym.length)];
    const a=Math.random()*Math.PI*2, d=100+Math.random()*290;
    el.style.cssText=`left:${innerWidth/2}px;top:${innerHeight/2}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation-delay:${Math.random()*.4}s;font-size:${1.4+Math.random()*.8}rem`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1900);
  }
}

// ===== SHAKE =====
function shakeScreen(hard=false){
  document.body.classList.remove('shaking','flashing');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  if(hard){document.body.classList.add('flashing');}
  setTimeout(()=>document.body.classList.remove('shaking','flashing'),900);
}

// ===== CHARACTER =====
function updateOutfit(n){
  const w=document.getElementById('charWrap');
  w.classList.remove('outfit-hoodie','outfit-shirt','outfit-grad');
  if(n>=3) w.classList.add('outfit-grad');
  else if(n>=1) w.classList.add('outfit-shirt');
  else w.classList.add('outfit-hoodie');
}

function doFlip(){
  const b=document.getElementById('charBody');
  b.classList.remove('flipping');
  void b.offsetWidth;
  b.classList.add('flipping');
  setTimeout(()=>b.classList.remove('flipping'),950);
}

function moveChar(idx){
  const capped=Math.min(idx,3);
  document.querySelectorAll('.stone').forEach((s,i)=>{
    s.classList.remove('current','visited');
    if(i<capped) s.classList.add('visited');
    else if(i===capped) s.classList.add('current');
  });
  currentStone=capped;
  document.getElementById('charWrap').style.left=STONE_PCT[capped]+'%';
}

// ===== CROWD =====
const SKINS=['#F4C07A','#E89050','#C07040','#8B5E3C','#FDDBA8'];
const SHIRTS=['#E74C3C','#3498DB','#2ECC71','#9B59B6','#F39C12','#1ABC9C','#E84393'];
const PANTS=['#2C3E50','#34495E','#1A237E','#4A148C','#1B5E20','#BF360C'];

function spawnSceneCrowd(grad){
  const cont=document.getElementById('sceneCrowd');
  cont.innerHTML='';
  const n=grad?8:5;
  for(let i=0;i<n;i++){
    const div=document.createElement('div');
    const fromLeft=i%2===0;
    div.className='sc-person '+(fromLeft?'show-left':'show-right');
    const sk=SKINS[Math.floor(Math.random()*SKINS.length)];
    const sh=SHIRTS[Math.floor(Math.random()*SHIRTS.length)];
    const pa=PANTS[Math.floor(Math.random()*PANTS.length)];
    div.style.cssText=(fromLeft?`left:${4+i*11}%`:`right:${4+(i-1)*11}%`)+`;animation-delay:${i*.07}s`;
    div.innerHTML=`<div class="sc-h" style="background:${sk}"></div><div class="sc-b" style="background:${sh}"></div><div class="sc-legs"><div class="sc-l" style="background:${pa}"></div><div class="sc-l" style="background:${pa}"></div></div>`;
    cont.appendChild(div);
  }
}
function clearSceneCrowd(){document.getElementById('sceneCrowd').innerHTML='';}

  }

// ===== TASKS =====
function addTask(){
  const inp=document.getElementById('taskInput');
  const t=inp.value.trim(); if(!t){inp.focus();return;}
  tasks.push({id:Date.now(),text:t,done:false});
  inp.value=''; inp.focus();
  render();
}

function toggleTask(id){
  const task=tasks.find(t=>t.id===id);
  if(!task||task.done) return;
  task.done=true; completedCount++;
  updateOutfit(completedCount);

  // delay move so flip happens first
  setTimeout(()=>moveChar(completedCount),450);
  updateProg(); render();

  const grad=completedCount%3===0;
  if(isCelebrating) celQueue.push(grad);
  else triggerCel(grad);
}

function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);render();}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const ul=document.getElementById('tlist');
  if(!tasks.length){ul.innerHTML='<li class="empty-msg">할일을 추가해보세요! ✍️</li>';return;}
  ul.innerHTML='';
  tasks.forEach(t=>{
    const li=document.createElement('li');
    li.className='titem'+(t.done?' done':'');
    li.innerHTML=`<div class="tchk">${t.done?'✓':''}</div><span class="ttext">${esc(t.text)}</span><button class="tdel" onclick="event.stopPropagation();deleteTask(${t.id})">✕</button>`;
    if(!t.done) li.addEventListener('click',()=>toggleTask(t.id));
    ul.appendChild(li);
  });
}

// ===== INIT =====
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

// position char at stone 0
window.addEventListener('load',()=>{
  document.getElementById('charWrap').style.left=STONE_PCT[0]+'%';
});

render();
